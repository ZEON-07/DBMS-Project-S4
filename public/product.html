<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html">Dashboard</a>
        <a href="product.html">Products</a>
        <a href="supplier.html">Suppliers</a>
        <a href="purchase.html">Purchases</a>
        <a href="stock.html">Stock</a>
    </header>

    <div class="container">
        <nav><h2>Manage Products</h2></nav>

        <div class="form-container">
            <h3>Add/Edit Product</h3>
            <form id="productForm">
                <input type="hidden" id="product_id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="product_name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="category" required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" id="price" required min="0">
                </div>
                <button type="submit" class="btn" id="submitBtn">Save Product</button>
            </form>
        </div>

        <h3>Product List</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                <tr><td colspan="5">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);

        const form = document.getElementById('productForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('product_id').value;
            const payload = {
                product_name: document.getElementById('product_name').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value)
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/products/${id}` : '/api/products';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(await res.text());
                form.reset();
                document.getElementById('product_id').value = '';
                document.getElementById('submitBtn').textContent = 'Save Product';
                loadProducts();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        async function loadProducts() {
            const tbody = document.getElementById('productTableBody');
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No products found.</td></tr>';
                    return;
                }

                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${p.product_id}</td>
                        <td>${p.product_name}</td>
                        <td>${p.category}</td>
                        <td>$${p.price.toFixed(2)}</td>
                        <td>
                            <button class="btn" style="padding: 5px 10px; font-size: 14px;" onclick="editProduct(${p.product_id}, '${p.product_name.replace(/'/g, "\\'")}', '${p.category.replace(/'/g, "\\'")}', ${p.price})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct(${p.product_id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
            }
        }

        function editProduct(id, name, category, price) {
            document.getElementById('product_id').value = id;
            document.getElementById('product_name').value = name;
            document.getElementById('category').value = category;
            document.getElementById('price').value = price;
            document.getElementById('submitBtn').textContent = 'Update Product';
            window.scrollTo(0, 0);
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product? Note: Products with existing purchase history cannot be deleted.')) return;
            try {
                const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    if (errorData.error && errorData.error.includes('FOREIGN KEY constraint failed')) {
                        throw new Error('Cannot delete this product because it has already been purchased. Consider updating its details instead.');
                    }
                    throw new Error(errorData.error || await res.text());
                }
                loadProducts();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>

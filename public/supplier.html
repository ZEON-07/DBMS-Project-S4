<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Suppliers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html">Dashboard</a>
        <a href="product.html">Products</a>
        <a href="supplier.html">Suppliers</a>
        <a href="purchase.html">Purchases</a>
        <a href="stock.html">Stock</a>
    </header>

    <div class="container">
        <nav><h2>Manage Suppliers</h2></nav>

        <div class="form-container">
            <h3>Add/Edit Supplier</h3>
            <form id="supplierForm">
                <input type="hidden" id="supplier_id">
                <div class="form-group">
                    <label>Supplier Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" required>
                </div>
                <button type="submit" class="btn" id="submitBtn">Save Supplier</button>
            </form>
        </div>

        <h3>Supplier List</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="supplierTableBody">
                <tr><td colspan="4">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadSuppliers);

        const form = document.getElementById('supplierForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('supplier_id').value;
            const payload = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/suppliers/${id}` : '/api/suppliers';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(await res.text());
                form.reset();
                document.getElementById('supplier_id').value = '';
                document.getElementById('submitBtn').textContent = 'Save Supplier';
                loadSuppliers();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        async function loadSuppliers() {
            const tbody = document.getElementById('supplierTableBody');
            try {
                const res = await fetch('/api/suppliers');
                const suppliers = await res.json();
                
                if (suppliers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No suppliers found.</td></tr>';
                    return;
                }

                tbody.innerHTML = suppliers.map(s => `
                    <tr>
                        <td>${s.supplier_id}</td>
                        <td>${s.name}</td>
                        <td>${s.phone}</td>
                        <td>
                            <button class="btn" onclick="editSupplier(${s.supplier_id}, '${s.name.replace(/'/g, "\\'")}', '${s.phone.replace(/'/g, "\\'")}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteSupplier(${s.supplier_id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4">Error loading data</td></tr>`;
            }
        }

        function editSupplier(id, name, phone) {
            document.getElementById('supplier_id').value = id;
            document.getElementById('name').value = name;
            document.getElementById('phone').value = phone;
            document.getElementById('submitBtn').textContent = 'Update Supplier';
            window.scrollTo(0, 0);
        }

        async function deleteSupplier(id) {
            if (!confirm('Are you sure you want to delete this supplier? Note: Deletion is restricted if there are existing purchases tied to this supplier due to database constraints.')) return;
            try {
                const res = await fetch(`/api/suppliers/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    if (errorData.error && errorData.error.includes('FOREIGN KEY constraint failed')) {
                        throw new Error('Cannot delete this supplier because there are purchases associated with them.');
                    }
                    throw new Error(errorData.error || await res.text());
                }
                loadSuppliers();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>

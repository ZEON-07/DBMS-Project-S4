<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Purchases</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html">Dashboard</a>
        <a href="product.html">Products</a>
        <a href="supplier.html">Suppliers</a>
        <a href="purchase.html">Purchases</a>
        <a href="stock.html">Stock</a>
    </header>

    <div class="container">
        <nav><h2>Manage Purchases</h2></nav>

        <div class="form-container">
            <h3>Record New Purchase</h3>
            <p><em>Recording a purchase will automatically increase the stock of the selected product via database triggers.</em></p>
            <form id="purchaseForm">
                <div class="form-group">
                    <label>Supplier</label>
                    <select id="supplier_id" required>
                        <option value="">-- Select Supplier --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product</label>
                    <select id="product_id" required>
                        <option value="">-- Select Product --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity Bought</label>
                    <input type="number" id="quantity" min="1" required>
                </div>
                <button type="submit" class="btn">Record Purchase</button>
            </form>
        </div>

        <h3>Purchase History</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Supplier</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Unit Cost</th>
                    <th>Total Cost</th>
                </tr>
            </thead>
            <tbody id="purchaseTableBody">
                <tr><td colspan="7">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadDropdowns();
            loadPurchases();
        });

        const form = document.getElementById('purchaseForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                supplier_id: parseInt(document.getElementById('supplier_id').value),
                product_id: parseInt(document.getElementById('product_id').value),
                quantity: parseInt(document.getElementById('quantity').value)
            };

            try {
                const res = await fetch('/api/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error(await res.text());
                form.reset();
                loadPurchases();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        async function loadDropdowns() {
            try {
                const [supRes, prodRes] = await Promise.all([
                    fetch('/api/suppliers'),
                    fetch('/api/products')
                ]);
                const suppliers = await supRes.json();
                const products = await prodRes.json();

                const supSelect = document.getElementById('supplier_id');
                suppliers.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.supplier_id;
                    opt.textContent = s.name;
                    supSelect.appendChild(opt);
                });

                const prodSelect = document.getElementById('product_id');
                products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.product_id;
                    opt.textContent = `${p.product_name} ($${p.price.toFixed(2)})`;
                    prodSelect.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load dropdowns");
            }
        }

        async function loadPurchases() {
            const tbody = document.getElementById('purchaseTableBody');
            try {
                const res = await fetch('/api/purchases');
                const history = await res.json();
                
                if (history.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7">No purchases recorded yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = history.map(h => `
                    <tr>
                        <td>${h.purchase_id}</td>
                        <td>${h.purchase_date}</td>
                        <td>${h.supplier_name}</td>
                        <td>${h.product_name}</td>
                        <td>${h.quantity}</td>
                        <td>$${h.price.toFixed(2)}</td>
                        <td><strong>$${h.total_cost.toFixed(2)}</strong></td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="7">Error loading data</td></tr>`;
            }
        }
    </script>
</body>
</html>
